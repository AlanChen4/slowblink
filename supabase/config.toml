# Supabase CLI config — https://supabase.com/docs/guides/cli/config
# Committed to git; secrets are referenced via env(VAR) and live in supabase/.env.
project_id = "slowblink"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Deep-link scheme registered by the Electron app (see electron-builder.yml).
site_url = "slowblink://app"
additional_redirect_urls = ["slowblink://auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
skip_nonce_check = false

[edge_runtime]
enabled = true
# "oneshot" gives a fresh isolate per invocation — safer for secrets handling.
policy = "oneshot"
inspector_port = 8083

# Per-function config. `verify_jwt = true` is the default; only disable where
# the function is authenticated by another means (Stripe signature below).

[functions.ingest]
verify_jwt = true

[functions.ai-summarize]
verify_jwt = true

[functions.billing-checkout]
verify_jwt = true

[functions.billing-portal]
verify_jwt = true

[functions.delete-all]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false

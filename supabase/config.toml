# Supabase CLI config — https://supabase.com/docs/guides/cli/config
# Committed to git; secrets are referenced via env(VAR) and live in supabase/.env.
project_id = "slowblink"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]

[db]
port = 55322
shadow_port = 55320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 55323

[inbucket]
enabled = true
port = 55324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Deep-link scheme registered by the Electron app (see electron-builder.yml).
site_url = "slowblink://app"
additional_redirect_urls = [
  "slowblink://auth/callback",
  # Edge function bridge page that deep-links back into Electron and closes
  # the browser tab. See supabase/functions/auth-callback/index.ts.
  "http://127.0.0.1:55321/functions/v1/auth-callback",
  "http://localhost:55321/functions/v1/auth-callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Required for Google OAuth: Supabase treats a first-time OAuth login as a
# signup (no matching row in auth.users yet). Email/password signups stay
# disabled separately under [auth.email].
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
skip_nonce_check = false

[edge_runtime]
enabled = true
# "oneshot" gives a fresh isolate per invocation — safer for secrets handling.
policy = "oneshot"
inspector_port = 8083

# Per-function config. `verify_jwt = true` is the default; only disable where
# the function is authenticated by another means (Stripe signature below).

[functions.ingest]
verify_jwt = true

[functions.ai-summarize]
verify_jwt = true

[functions.billing-checkout]
verify_jwt = true

[functions.billing-portal]
verify_jwt = true

[functions.delete-all]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false

# Browser-facing HTML bridge for OAuth callback — closes the tab and
# hands the PKCE code to Electron via slowblink:// deep link.
[functions.auth-callback]
verify_jwt = false

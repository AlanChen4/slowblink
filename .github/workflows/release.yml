name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload artifacts to a GitHub Release? Leave unchecked for a dry run (artifact attached to the workflow run instead).'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Triggered manually — running build (dry run unless publish=true)"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Triggered by tag push — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(jq -r .version package.json)
          PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version || echo "")
          if [ "$PREV_VERSION" != "$VERSION" ]; then
            echo "Version bumped: $PREV_VERSION -> $VERSION — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change in package.json — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Decode signing cert
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
        run: |
          echo "$MAC_CERTS_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "CSC_LINK=$RUNNER_TEMP/cert.p12" >> "$GITHUB_ENV"

      - name: Install ASC API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PUBLISH_MODE=always
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" != "true" ]]; then
            PUBLISH_MODE=never
          fi
          echo "Publishing mode: $PUBLISH_MODE"
          pnpm exec electron-builder --mac --x64 --arm64 --publish "$PUBLISH_MODE"

      - name: Upload dry-run artifact
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: dmg-dry-run-${{ github.sha }}
          path: dist/*.dmg
          if-no-files-found: error

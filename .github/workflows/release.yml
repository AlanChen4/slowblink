name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Triggered by tag push — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(jq -r .version package.json)
          PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version || echo "")
          if [ "$PREV_VERSION" != "$VERSION" ]; then
            echo "Version bumped: $PREV_VERSION -> $VERSION — releasing"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change in package.json — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build and publish (unsigned)
        run: pnpm exec electron-builder --mac --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm knip
      - run: node scripts/check-deprecated.js
      - run: pnpm test

  build-mac:
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Package (unsigned)
        run: pnpm exec electron-builder --mac --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify DMG exists
        run: ls -lh dist/*.dmg
